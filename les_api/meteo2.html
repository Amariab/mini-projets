<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo Paris</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background 0.5s;
            color: #fff;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }

        #weather {
            font-size: 1.5em;
            margin-top: 10px;
        }

        #icon {
            width: 100px;
            height: 100px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Météo à Paris</h1>
    <button onclick="getWeather()">Afficher la météo</button>
    <div id="weather">Clique sur le bouton pour voir la météo</div>
    <img id="icon" src="" alt="Icône météo">

    <script>
        function getWeather() {
            const apiKey = ""; // clé récupérée sur OpenWeatherMap
            const city = "Paris";

            fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=fr`)
                .then(res => {
                    if (!res.ok) throw new Error(`Erreur réseau: ${res.status} ${res.statusText}`);
                    return res.json();
                })
                .then(data => {
                    console.log(data); // debug

                    const temp = data.main.temp.toFixed(1);
                    const desc = data.weather[0].description;
                    const humidity = data.main.humidity;
                    const iconCode = data.weather[0].icon;

                    // Texte météo
                    document.getElementById("weather").innerText =
                        `Il fait ${temp}°C à ${city}, ${desc}. Humidité : ${humidity}%`;

                    // Icône météo
                    document.getElementById("icon").src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
                    document.getElementById("icon").alt = desc;

                    // Fond selon la météo
                    let bgColor = "#4a90e2"; // défaut bleu ciel
                    if (iconCode.includes("n")) bgColor = "#2c3e50"; // nuit
                    else if (iconCode.startsWith("01")) bgColor = "#f39c12"; // clair
                    else if (iconCode.startsWith("02") || iconCode.startsWith("03") || iconCode.startsWith("04")) bgColor = "#95a5a6"; // nuage
                    else if (iconCode.startsWith("09") || iconCode.startsWith("10")) bgColor = "#3498db"; // pluie
                    else if (iconCode.startsWith("11")) bgColor = "#34495e"; // orage
                    else if (iconCode.startsWith("13")) bgColor = "#ecf0f1"; // neige

                    document.body.style.background = bgColor;

                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("weather").innerText = "Impossible de récupérer la météo.";
                    document.getElementById("icon").src = "";
                    document.body.style.background = "#7f8c8d";
                });
        }
    </script>

</body>

</html>
