<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Double Sidebar Responsive</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar de bureau */
    .sidebar-desktop {
      width: 250px;
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      display: none; /* caché par défaut */
    }

    /* Sidebar mobile */
    .sidebar-mobile {
      width: 100%;
      background-color: #34495e;
      color: white;
      padding: 20px;
      display: none; /* caché par défaut */
    }

    /* Contenu principal */
    .main-content {
      flex: 1;
      padding: 20px;
    }

    /* Affichage selon la taille de l'écran */
    @media (min-width: 768px) {
      .sidebar-desktop {
        display: block;
      }

      .sidebar-mobile {
        display: none;
      }

      body {
        flex-direction: row;
      }
    }

    @media (max-width: 767px) {
      .sidebar-desktop {
        display: none;
      }

      .sidebar-mobile {
        display: block;
      }

      body {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <!-- Sidebar pour bureau -->
  <aside class="sidebar-desktop">
    <h2>Menu Desktop</h2>
    <ul>
      <li>Accueil</li>
      <li>Profil</li>
      <li>Paramètres</li>
    </ul>
  </aside>

  <!-- Sidebar pour mobile -->
  <aside class="sidebar-mobile">
    <h2>Menu Mobile</h2>
    <ul>
      <li>Accueil</li>
      <li>Profil</li>
      <li>Paramètres</li>
    </ul>
  </aside>

  <!-- Contenu principal -->
  <main class="main-content">
    <h1>Bienvenue !</h1>
    <p>Ceci est le contenu principal de la page.</p>
  </main>
</body>
</html>
