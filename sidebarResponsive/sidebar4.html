<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sidebar responsive sans JS avec une seule sidebar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #menu-toggle {
      display: none;
    }

    .hamburger-label {
      display: none;
      font-size: 28px;
      padding: 16px;
      background-color: #2c3e50;
      color: white;
      cursor: pointer;
      user-select: none;
    }

    .sidebar {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      display: none;
    }

    .main-content {
      padding: 20px;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
      body {
        display: flex;
      }

      .sidebar {
        display: block;
        width: 250px;
        min-height: 100vh;
      }

      .hamburger-label {
        display: none;
      }

      .main-content {
        flex: 1;
      }
    }

    /* MOBILE */
    @media (max-width: 767px) {
      .hamburger-label {
        display: block;
        width: 100%;
      }

      #menu-toggle:checked + .hamburger-label + .sidebar {
        display: block;
        animation: slideDown 0.3s ease;
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px); /* commence légèrement au-dessus */
      }
      to {
        opacity: 1;
        transform: translateY(0); /* termine à sa position normale */
      }
    }
  </style>
</head>
<body>

  <!-- Contrôle mobile -->
  <input type="checkbox" id="menu-toggle" />
  <label for="menu-toggle" class="hamburger-label">☰ Menu</label>

  <!-- Sidebar commune -->
  <aside class="sidebar">
    <h2>Menu</h2>
    <ul>
      <li><a href="#">Accueil</a></li>
      <li><a href="#">Profil</a></li>
      <li><a href="#">Paramètres</a></li>
    </ul>
  </aside>

  <!-- Contenu principal -->
  <main class="main-content">
    <h1>Bienvenue !</h1>
    <p>Ceci est le contenu principal de la page.</p>
  </main>

</body>
</html>
