<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Accordéon avec SVG</title>
  <style>
    body {
      background: #1e1e1e;
      color: #f0f0f0;
      font-family: sans-serif;
      padding: 2rem;
    }

    details {
      background: #2b2b2b;
      border: 1px solid #444;
      border-radius: 6px;
      margin-bottom: 1rem;
      padding: 1rem;
    }

    summary {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1rem;
    }

    summary svg {
      margin-right: 0.5rem;
      transition: transform 0.3s ease;
      width: 1em;
      height: 1em;
      fill: #f0f0f0;
    }

    details[open] summary svg {
      transform: rotate(90deg);
    }

    .content {
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <h2>Accordéon avec Icône SVG personnalisée</h2>

  <details>
    <summary>
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      Cliquer ici
    </summary>
    <div class="content">
      <p>Ce résumé utilise une icône SVG (flèche) animée à la place du marqueur HTML.</p>
    </div>
  </details>

</body>
</html>
