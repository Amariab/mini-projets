<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Accordion</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #111827;
      color: white;
    }

    .sidebar {
      width: 300px;
      background: #1f2937;
      padding: 1rem;
      box-shadow: 2px 0 10px rgba(0,0,0,0.3);
    }

    h3 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    details {
      background: #374151;
      border-radius: 6px;
      margin-bottom: 1rem;
      padding: 0.5rem 1rem;
    }

    summary {
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
    }

    .content {
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h3>🧭 Panneau de Contrôle</h3>

    <details>
      <summary>Statistiques</summary>
      <div class="content">
        <p>Utilisateurs : 1234<br>Sessions : 89</p>
      </div>
    </details>

    <details>
      <summary>Notifications</summary>
      <div class="content">
        <p>2 alertes système non lues.</p>
      </div>
    </details>

    <details>
      <summary>Paramètres</summary>
      <div class="content">
        <p>Gérer les utilisateurs, accès, et préférences.</p>
      </div>
    </details>
  </div>

</body>
</html>
