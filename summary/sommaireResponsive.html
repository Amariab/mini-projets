<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Responsive Accordion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 1rem;
      background: #f9f9f9;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    details {
      background: white;
      border-radius: 6px;
      margin-bottom: 1rem;
      padding: 1rem;
      border: 1px solid #ccc;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
    }

    .content {
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    @media (max-width: 480px) {
      body {
        padding: 0.5rem;
      }

      summary {
        font-size: 0.95rem;
      }

      .content {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Accordéon Responsive</h2>

    <details>
      <summary>Section mobile-friendly</summary>
      <div class="content">
        <p>Ce bloc s'adapte aux petits écrans avec une mise en page fluide et des polices ajustées.</p>
      </div>
    </details>
  </div>

</body>
</html>
